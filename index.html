<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            color:#333;
        }

        /* HEADER */
        header{
            background:#007bff;
            color:white;
            text-align:center;
            padding:20px;
        }

        /* MAIN */
        main{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px 15px;
        }

        .container{
            background:white;
            width:100%;
            max-width:450px;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        .perfil{
            text-align:center;
            margin-bottom:20px;
        }

        .perfil img{
            width:120px;
            height:120px;
            border-radius:50%;
            border:4px solid #007bff;
            object-fit:cover;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        form label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        form input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        input[type="color"]{
            height:50px;
            padding:5px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:5px;
            background:#007bff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        /* FOOTER */
        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:20px;
        }

        /* RESPONSIVE */
        @media(max-width:500px){

            .container{
                padding:20px;
            }

            h2{
                font-size:22px;
            }

        }

    </style>

</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>Registro de Usuario</h1>
    </header>

    <!-- MAIN -->
    <main>

        <div class="container">

            <!-- Imagen Perfil -->
            <div class="perfil">
                <img src="https://via.placeholder.com/120"
                     alt="Imagen de perfil">
            </div>

            <h2>Crear Cuenta</h2>

            <form id="formRegistro">

                <!-- Nombre -->
                <label for="nombre">Nombre Completo:</label>
                <input
                    type="text"
                    id="nombre"
                    required
                >

                <!-- Correo -->
                <label for="correo">Correo Electrónico:</label>
                <input
                    type="email"
                    id="correo"
                    placeholder="ejemplo@gmail.com"
                    required
                >

                <!-- Contraseña -->
                <label for="password">Contraseña:</label>
                <input
                    type="password"
                    id="password"
                    minlength="8"
                    placeholder="Mínimo 8 caracteres"
                    required
                >

                <!-- Fecha -->
                <label for="fecha">Fecha de Nacimiento:</label>
                <input
                    type="date"
                    id="fecha"
                    required
                >

                <!-- Color -->
                <label for="color">Color Favorito:</label>
                <input
                    type="color"
                    id="color"
                >

                <!-- País con datalist -->
                <label for="pais">País:</label>

                <input
                    list="paises"
                    id="pais"
                    placeholder="Selecciona un país"
                    required
                >

                <datalist id="paises">
                    <option value="México">
                    <option value="Argentina">
                    <option value="Colombia">
                    <option value="Chile">
                    <option value="España">
                    <option value="Perú">
                    <option value="Estados Unidos">
                </datalist>

                <!-- Botón -->
                <button type="submit">Registrarse</button>

            </form>

        </div>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>Proyecto Final - Registro de Usuario</p>
    </footer>

    <script>

        const form = document.getElementById("formRegistro");

        form.addEventListener("submit", function(event){

            event.preventDefault();

            const password =
                document.getElementById("password").value;

            if(password.length < 8){
                alert("La contraseña debe tener mínimo 8 caracteres.");
                return;
            }

            alert("Usuario registrado correctamente.");

            form.reset();

        });

    </script>

</body>
</html>
